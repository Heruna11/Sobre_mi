<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Contacto</title>
<link href="diseñoP.css" rel="stylesheet">
</head>

<body>

<div class="contenedor-contacto">

    <h1 class="titulo-contacto">Contacto</h1>

    <div class="contenido-contacto">

        <!-- IMAGEN PERSONAL -->
        <div class="contacto-foto">
            <img src="imagenes/yo.png" alt="Mi foto" class="img-contacto">
        </div>

        <!-- APARTADOS PARA QR -->
        <div class="contacto-qr-container">

            <div class="qr-item">
                <img src="imagenes/wsap.png" class="qr-img" alt="QR 1">
                <h3 class="qr-titulo">WhatsApp</h3>
            </div>

            <div class="qr-item">
              <img src="imagenes/ím.png" class="qr-img" alt="QR 2">
                <h3 class="qr-titulo">Instagram</h3>
            </div>

            <div class="qr-item">
              <img src="imagenes/cr.png" class="qr-img" alt="QR 3">
                <h3 class="qr-titulo">Correo</h3>
            </div>

        </div>

    </div>

</div>

<a href="apartados.html" class="btn-continuar">REGRESAR</a>

</body>
</html>
